<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影智能推荐系统</title>
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #111640;
            --bg-card: #171c4a;
            --bg-card-hover: #1e2460;
            --bg-input: #1a1f50;
            --accent-primary: #6c5ce7;
            --accent-secondary: #a29bfe;
            --accent-gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 50%, #74b9ff 100%);
            --accent-gradient-warm: linear-gradient(135deg, #fd79a8 0%, #e17055 100%);
            --accent-gradient-green: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
            --text-primary: #edf2fb;
            --text-secondary: #a0a8c8;
            --text-muted: #6b7394;
            --border-color: #2a2f5e;
            --border-active: #6c5ce7;
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.4);
            --shadow-card: 0 8px 32px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(108,92,231,0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(162,155,254,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(116,185,255,0.04) 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }
        .app { position: relative; z-index: 1; }
        .header {
            background: rgba(17,22,64,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            position: sticky; top: 0; z-index: 100;
        }
        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; height: 64px;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 20px; font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            cursor: default;
        }
        .logo svg { flex-shrink: 0; }
        .nav-tabs { display: flex; gap: 4px; height: 64px; align-items: center; }
        .nav-tab {
            padding: 8px 20px; border-radius: var(--radius-sm);
            cursor: pointer; transition: var(--transition);
            color: var(--text-secondary); font-size: 14px; font-weight: 500;
            border: none; background: none;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .nav-tab:hover { color: var(--text-primary); background: rgba(108,92,231,0.1); }
        .nav-tab.active {
            color: var(--text-primary); background: rgba(108,92,231,0.2);
            box-shadow: inset 0 -2px 0 var(--accent-primary);
        }
        .user-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 20px;
            background: rgba(108,92,231,0.15); border: 1px solid rgba(108,92,231,0.3);
            font-size: 13px; color: var(--accent-secondary);
            cursor: pointer; transition: var(--transition);
        }
        .user-badge:hover { background: rgba(108,92,231,0.25); }
        .main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        .page-title {
            font-size: 28px; font-weight: 700; margin-bottom: 8px;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-desc { color: var(--text-secondary); margin-bottom: 28px; font-size: 15px; }
        .form-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
        .form-group label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        input, select {
            padding: 10px 14px; background: var(--bg-input);
            border: 1px solid var(--border-color); border-radius: var(--radius-sm);
            color: var(--text-primary); font-size: 14px;
            transition: var(--transition); outline: none; font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(108,92,231,0.15); }
        input::placeholder { color: var(--text-muted); }
        select option { background: var(--bg-secondary); color: var(--text-primary); }
        .btn {
            padding: 10px 24px; border-radius: var(--radius-sm); border: none;
            cursor: pointer; font-size: 14px; font-weight: 600;
            transition: var(--transition); display: inline-flex; align-items: center; gap: 6px;
            font-family: inherit; white-space: nowrap;
        }
        .btn-primary {
            background: var(--accent-gradient); color: white;
            box-shadow: 0 4px 15px rgba(108,92,231,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(108,92,231,0.4); }
        .btn-primary:active { transform: translateY(0); }
        .btn-secondary { background: rgba(108,92,231,0.15); color: var(--accent-secondary); border: 1px solid rgba(108,92,231,0.3); }
        .btn-secondary:hover { background: rgba(108,92,231,0.25); }
        .btn-danger { background: rgba(214,48,49,0.15); color: #ff7675; border: 1px solid rgba(214,48,49,0.3); }
        .btn-danger:hover { background: rgba(214,48,49,0.25); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-icon {
            width: 36px; height: 36px; padding: 0;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(108,92,231,0.15);
            border: 1px solid rgba(108,92,231,0.3); color: var(--accent-secondary);
            cursor: pointer; transition: var(--transition);
        }
        .btn-icon:hover { background: rgba(108,92,231,0.3); }
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; margin-top: 24px;
        }
        .movie-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 20px;
            transition: var(--transition); position: relative; overflow: hidden;
            animation: slideUp 0.5s ease backwards;
        }
        .movie-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 3px; background: var(--accent-gradient); opacity: 0; transition: var(--transition);
        }
        .movie-card:hover { border-color: rgba(108,92,231,0.4); transform: translateY(-4px); box-shadow: var(--shadow-card); }
        .movie-card:hover::before { opacity: 1; }
        .movie-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px; }
        .movie-card-title { font-size: 16px; font-weight: 600; color: var(--text-primary); line-height: 1.4; flex: 1; }
        .movie-card-year {
            font-size: 12px; color: var(--text-muted); white-space: nowrap;
            padding: 2px 8px; background: rgba(108,92,231,0.1); border-radius: 4px;
        }
        .movie-card-score {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-bottom: 10px;
        }
        .score-high { background: rgba(0,184,148,0.15); color: #55efc4; }
        .score-mid { background: rgba(253,203,110,0.15); color: #fdcb6e; }
        .score-low { background: rgba(214,48,49,0.15); color: #ff7675; }
        .movie-card-genres { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .genre-tag {
            padding: 3px 10px; border-radius: 12px; font-size: 11px;
            background: rgba(162,155,254,0.1); color: var(--accent-secondary);
            border: 1px solid rgba(162,155,254,0.2);
        }
        .movie-card-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 8px; padding-top: 12px; border-top: 1px solid var(--border-color);
        }
        .fav-btn {
            display: flex; align-items: center; gap: 4px; padding: 5px 12px;
            border-radius: 16px; border: 1px solid rgba(253,121,168,0.3);
            background: rgba(253,121,168,0.08); color: #fd79a8;
            cursor: pointer; font-size: 12px; transition: var(--transition); font-family: inherit;
        }
        .fav-btn:hover { background: rgba(253,121,168,0.2); }
        .fav-btn.active { background: rgba(253,121,168,0.3); }
        .detail-btn {
            padding: 5px 12px; border-radius: 16px;
            border: 1px solid rgba(108,92,231,0.3); background: rgba(108,92,231,0.08);
            color: var(--accent-secondary); cursor: pointer; font-size: 12px;
            transition: var(--transition); font-family: inherit;
        }
        .detail-btn:hover { background: rgba(108,92,231,0.2); }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 20px; text-align: center; transition: var(--transition);
        }
        .stat-card:hover { border-color: rgba(108,92,231,0.4); transform: translateY(-2px); }
        .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-value {
            font-size: 28px; font-weight: 700; background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .section-title {
            font-size: 20px; font-weight: 600; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
        .bar-chart {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 24px;
        }
        .bar-chart-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); }
        .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .bar-label { min-width: 60px; text-align: right; font-size: 13px; color: var(--text-secondary); }
        .bar-track {
            flex: 1; height: 28px; background: rgba(108,92,231,0.08);
            border-radius: 6px; overflow: hidden; position: relative;
        }
        .bar-fill {
            height: 100%; border-radius: 6px; background: var(--accent-gradient);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 8px; min-width: 30px;
        }
        .bar-fill-text { font-size: 11px; font-weight: 600; color: white; }
        .genres-chart {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 24px; margin-top: 20px;
        }
        .genre-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .genre-label { min-width: 80px; text-align: right; font-size: 13px; color: var(--text-secondary); }
        .genre-bar-track {
            flex: 1; height: 22px; background: rgba(108,92,231,0.08);
            border-radius: 5px; overflow: hidden;
        }
        .genre-bar-fill {
            height: 100%; border-radius: 5px;
            background: var(--accent-gradient-warm);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
        }
        .genre-bar-fill-text { font-size: 10px; font-weight: 600; color: white; }
        .pagination {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; margin-top: 24px;
        }
        .page-btn {
            padding: 8px 14px; border-radius: var(--radius-sm);
            border: 1px solid var(--border-color); background: var(--bg-card);
            color: var(--text-secondary); cursor: pointer; transition: var(--transition);
            font-family: inherit; font-size: 13px;
        }
        .page-btn:hover { border-color: var(--accent-primary); color: var(--text-primary); }
        .page-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info { font-size: 13px; color: var(--text-muted); padding: 0 8px; }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid rgba(108,92,231,0.2); border-top-color: var(--accent-primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .spinner-lg { width: 40px; height: 40px; border-width: 3px; }
        .loading-overlay {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 20px; gap: 16px; color: var(--text-secondary);
        }
        .toast-container {
            position: fixed; top: 80px; right: 24px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px 20px; border-radius: var(--radius-sm);
            font-size: 14px; animation: slideInRight 0.4s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 8px;
            max-width: 360px; backdrop-filter: blur(10px);
        }
        .toast-success { background: rgba(0,184,148,0.9); color: white; }
        .toast-error { background: rgba(214,48,49,0.9); color: white; }
        .toast-info { background: rgba(108,92,231,0.9); color: white; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); z-index: 200;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); padding: 32px;
            max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto;
            box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease;
        }
        .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .modal-close {
            float: right; background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 20px; padding: 4px; transition: var(--transition);
        }
        .modal-close:hover { color: var(--text-primary); }
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-muted);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state-text { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }
        .empty-state-sub { font-size: 13px; }
        .auth-container {
            max-width: 420px; margin: 0 auto;
        }
        .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; }
        .auth-tab {
            flex: 1; padding: 12px; text-align: center;
            background: var(--bg-card); border: 1px solid var(--border-color);
            cursor: pointer; font-size: 14px; font-weight: 500;
            color: var(--text-secondary); transition: var(--transition); font-family: inherit;
        }
        .auth-tab:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
        .auth-tab:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
        .auth-tab.active { background: rgba(108,92,231,0.2); color: var(--text-primary); border-color: var(--accent-primary); }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-form .form-group { margin-bottom: 16px; }
        .profile-header {
            display: flex; align-items: center; gap: 20px;
            padding: 24px; background: var(--bg-card);
            border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-bottom: 24px;
        }
        .profile-avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: var(--accent-gradient); display: flex;
            align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; color: white; flex-shrink: 0;
        }
        .profile-info { flex: 1; }
        .profile-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .profile-meta { font-size: 13px; color: var(--text-muted); }
        .profile-stats-row { display: flex; gap: 24px; margin-top: 8px; }
        .profile-stat-item { font-size: 13px; color: var(--text-secondary); }
        .profile-stat-item span { font-weight: 600; color: var(--accent-secondary); }
        .favorites-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px;
        }
        .fav-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--bg-card);
            border: 1px solid var(--border-color); border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .fav-item:hover { border-color: rgba(108,92,231,0.3); }
        .fav-item-info { flex: 1; min-width: 0; }
        .fav-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fav-item-genres { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .rating-stars { display: flex; gap: 2px; }
        .rating-star { color: var(--text-muted); cursor: pointer; font-size: 20px; transition: var(--transition); }
        .rating-star.filled { color: #fdcb6e; }
        .rating-star:hover { color: #fdcb6e; transform: scale(1.2); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .tag-cloud-item {
            padding: 6px 14px; border-radius: 16px; font-size: 12px;
            background: rgba(108,92,231,0.1); color: var(--accent-secondary);
            border: 1px solid rgba(108,92,231,0.15); transition: var(--transition);
        }
        .tag-cloud-item:hover { background: rgba(108,92,231,0.2); transform: scale(1.05); }
        @media (max-width: 768px) {
            .header-inner { flex-wrap: wrap; height: auto; padding: 12px 0; gap: 8px; }
            .nav-tabs { height: auto; flex-wrap: wrap; gap: 2px; }
            .nav-tab { padding: 6px 12px; font-size: 12px; }
            .main { padding: 16px 12px; }
            .page-title { font-size: 22px; }
            .card-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .dashboard-grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; }
            .user-badge { display: none; }
            .movie-card { padding: 16px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .nav-tab span { display: none; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="toast-container" id="toastContainer"></div>
    <div id="modalContainer"></div>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2">
                    <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#74b9ff"/></linearGradient></defs>
                    <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/>
                </svg>
                MovieRec
            </div>
            <nav class="nav-tabs" id="navTabs">
                <button class="nav-tab active" data-tab="rec" onclick="switchTab('rec')">&#x1f3af; <span>智能推荐</span></button>
                <button class="nav-tab" data-tab="search" onclick="switchTab('search')">&#x1f50d; <span>电影搜索</span></button>
                <button class="nav-tab" data-tab="top" onclick="switchTab('top')">&#x1f3c6; <span>排行榜</span></button>
                <button class="nav-tab" data-tab="dashboard" onclick="switchTab('dashboard')">&#x1f4ca; <span>数据看板</span></button>
                <button class="nav-tab" data-tab="profile" onclick="switchTab('profile')">&#x1f464; <span>个人中心</span></button>
            </nav>
            <div class="user-badge" id="userBadge" onclick="switchTab('profile')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span id="userBadgeText">未登录</span>
            </div>
        </div>
    </header>
    <main class="main">
        <!-- 推荐页 -->
        <div class="tab-content active" id="tab-rec">
            <h1 class="page-title">智能推荐</h1>
            <p class="page-desc">基于协同过滤与神经网络算法，为您精准推荐感兴趣的电影</p>
            <div class="form-row">
                <div class="form-group">
                    <label>用户ID</label>
                    <input type="number" id="recUserId" placeholder="输入用户ID (1-610)" min="1" max="610">
                </div>
                <div class="form-group">
                    <label>推荐算法</label>
                    <select id="recAlgorithm">
                        <option value="itemcf">物品协同过滤 (ItemCF)</option>
                        <option value="neural">神经网络模型 (Neural)</option>
                    </select>
                </div>
                <div class="form-group" style="max-width:140px">
                    <label>推荐数量</label>
                    <input type="number" id="recNum" value="10" min="1" max="20">
                </div>
                <div class="form-group" style="flex:0;justify-content:flex-end">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" onclick="getRecommendations()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                        获取推荐
                    </button>
                </div>
            </div>
            <div id="recResults"></div>
        </div>

        <!-- 搜索页 -->
        <div class="tab-content" id="tab-search">
            <h1 class="page-title">电影搜索</h1>
            <p class="page-desc">搜索和浏览电影数据库，按条件筛选您感兴趣的电影</p>
            <div class="form-row">
                <div class="form-group" style="flex:2">
                    <label>关键词</label>
                    <input type="text" id="searchQuery" placeholder="输入电影名称关键词...">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="searchGenre"><option value="">全部类型</option></select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>年份起</label>
                    <input type="number" id="searchYearFrom" placeholder="如 1990" min="1900" max="2025">
                </div>
                <div class="form-group">
                    <label>年份止</label>
                    <input type="number" id="searchYearTo" placeholder="如 2020" min="1900" max="2025">
                </div>
                <div class="form-group">
                    <label>排序方式</label>
                    <select id="searchSort">
                        <option value="rating">按评分</option>
                        <option value="title">按名称</option>
                        <option value="popularity">按热度</option>
                        <option value="year">按年份</option>
                    </select>
                </div>
                <div class="form-group" style="flex:0;justify-content:flex-end">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" onclick="searchMovies()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        搜索
                    </button>
                </div>
            </div>
            <div id="searchResults"></div>
        </div>

        <!-- 排行榜页 -->
        <div class="tab-content" id="tab-top">
            <h1 class="page-title">电影排行榜</h1>
            <p class="page-desc">浏览各类型的高评分电影，发现经典佳作</p>
            <div class="form-row">
                <div class="form-group" style="max-width:300px">
                    <label>按类型筛选</label>
                    <select id="topGenre" onchange="getTopMovies()"><option value="">全部类型</option></select>
                </div>
            </div>
            <div id="topResults"></div>
        </div>

        <!-- 数据看板 -->
        <div class="tab-content" id="tab-dashboard">
            <h1 class="page-title">数据看板</h1>
            <p class="page-desc">系统运行数据概览与统计分析</p>
            <div id="dashboardContent"></div>
        </div>

        <!-- 个人中心 -->
        <div class="tab-content" id="tab-profile">
            <h1 class="page-title">个人中心</h1>
            <p class="page-desc">登录后查看您的评分记录、收藏列表与个人数据</p>
            <div id="profileContent"></div>
        </div>
    </main>
</div>
<script>
const API = window.location.protocol === 'file:'
    ? 'http://localhost:5000/api'
    : window.location.origin + '/api';
let currentUser = null;
let favoritesCache = new Set();
let searchPage = 1;

function $(id) { return document.getElementById(id); }

function showToast(msg, type='info') {
    const c = $('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast toast-' + type;
    t.innerHTML = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

function showLoading(container, text='加载中...') {
    container.innerHTML = '<div class="loading-overlay"><div class="spinner spinner-lg"></div><div>' + text + '</div></div>';
}

function showEmpty(container, icon, text, sub='') {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">' + icon + '</div><div class="empty-state-text">' + text + '</div><div class="empty-state-sub">' + sub + '</div></div>';
}

function scoreClass(s) { return s >= 4 ? 'score-high' : s >= 3 ? 'score-mid' : 'score-low'; }

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    $('tab-' + tab).classList.add('active');
    document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
    if (tab === 'dashboard') loadDashboard();
    if (tab === 'top') getTopMovies();
    if (tab === 'profile') renderProfile();
}

async function apiFetch(url, opts={}) {
    try {
        const r = await fetch(API + url, opts);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || d.message || '请求失败');
        return d;
    } catch(e) {
        throw e;
    }
}

function renderMovieCard(movie, showFav=true, showDetail=true, scoreKey='avg_rating') {
    const score = movie.score || movie[scoreKey] || 0;
    const sClass = scoreClass(score);
    const year = movie.year || (movie.title && movie.title.match(/\((\d{4})\)/) ? movie.title.match(/\((\d{4})\)/)[1] : '');
    const title = movie.title || '未知电影';
    const genres = movie.genres || '';
    const genreList = typeof genres === 'string' ? genres.split('|').filter(Boolean) : (Array.isArray(genres) ? genres : []);
    const isFav = favoritesCache.has(movie.movie_id || movie.id);
    const mid = movie.movie_id || movie.id;

    let html = '<div class="movie-card" style="animation-delay:' + (Math.random()*0.3) + 's">';
    html += '<div class="movie-card-header"><div class="movie-card-title">' + escHtml(title) + '</div>';
    if (year) html += '<span class="movie-card-year">' + escHtml(String(year)) + '</span>';
    html += '</div>';
    html += '<div class="movie-card-score ' + sClass + '">&#9733; ' + Number(score).toFixed(2) + '</div>';
    html += '<div class="movie-card-genres">';
    genreList.forEach(g => { html += '<span class="genre-tag">' + escHtml(g) + '</span>'; });
    html += '</div>';
    html += '<div class="movie-card-footer">';
    if (showFav && mid) {
        html += '<button class="fav-btn' + (isFav ? ' active' : '') + '" onclick="toggleFavorite(' + mid + ',this)">' + (isFav ? '&#9829; 已收藏' : '&#9825; 收藏') + '</button>';
    }
    if (showDetail && mid) {
        html += '<button class="detail-btn" onclick="showMovieDetail(' + mid + ')">详情 &#8594;</button>';
    }
    html += '</div></div>';
    return html;
}

function escHtml(s) {
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function formatYearRange(range) {
    if (!range) return '-';
    if (typeof range === 'string') return range;
    if (range.min && range.max) return range.min + '-' + range.max;
    return '-';
}

async function toggleFavorite(mid, btn) {
    if (!currentUser) { showToast('请先登录', 'error'); switchTab('profile'); return; }
    const isFav = favoritesCache.has(mid);
    try {
        if (isFav) {
            await apiFetch('/users/' + currentUser.user_id + '/favorites', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({movie_id: mid}) });
            favoritesCache.delete(mid);
            btn.classList.remove('active');
            btn.innerHTML = '&#9825; 收藏';
            showToast('已取消收藏', 'info');
        } else {
            await apiFetch('/users/' + currentUser.user_id + '/favorites', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({movie_id: mid}) });
            favoritesCache.add(mid);
            btn.classList.add('active');
            btn.innerHTML = '&#9829; 已收藏';
            showToast('收藏成功!', 'success');
        }
    } catch(e) { showToast(e.message, 'error'); }
}

async function showMovieDetail(mid) {
    const mc = $('modalContainer');
    mc.innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal"><div class="loading-overlay"><div class="spinner spinner-lg"></div><div>加载电影详情...</div></div></div></div>';
    try {
        const data = await apiFetch('/movies/' + mid);
        let html = '<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal">';
        html += '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>';
        html += '<div class="modal-title">' + escHtml(data.title || '电影详情') + '</div>';
        if (data.year) html += '<p style="margin-bottom:8px;color:var(--text-secondary)">年份: ' + escHtml(String(data.year)) + '</p>';
        if (data.genres) {
            const gl = typeof data.genres === 'string' ? data.genres.split('|') : (Array.isArray(data.genres) ? data.genres : []);
            html += '<div class="movie-card-genres" style="margin-bottom:16px">';
            gl.forEach(g => html += '<span class="genre-tag">' + escHtml(g) + '</span>');
            html += '</div>';
        }
        if (data.avg_rating) html += '<p style="margin-bottom:16px"><span class="movie-card-score ' + scoreClass(data.avg_rating) + '">&#9733; ' + Number(data.avg_rating).toFixed(2) + '</span></p>';
        if (data.rating_count) html += '<p style="margin-bottom:16px;color:var(--text-secondary);font-size:13px">共 ' + data.rating_count + ' 人评分</p>';

        if (data.rating_distribution) {
            html += '<div class="section-title" style="font-size:15px">评分分布</div>';
            const rd = data.rating_distribution;
            const maxV = Math.max(...Object.values(rd), 1);
            for (let i = 5; i >= 1; i--) {
                const v = rd[i] || rd[String(i)] || 0;
                const pct = (v / maxV * 100).toFixed(1);
                html += '<div class="bar-row"><div class="bar-label">' + i + '星</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"><span class="bar-fill-text">' + v + '</span></div></div></div>';
            }
        }

        if (data.similar_movies && data.similar_movies.length > 0) {
            html += '<div class="section-title" style="font-size:15px;margin-top:20px">相似电影</div>';
            data.similar_movies.forEach(sm => {
                html += '<div style="padding:8px 0;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center">';
                html += '<span style="font-size:13px">' + escHtml(sm.title || '电影' + sm.movie_id) + '</span>';
                html += '<span class="movie-card-score ' + scoreClass(sm.score || 0) + '" style="font-size:12px;padding:2px 8px">&#9733; ' + Number(sm.score || 0).toFixed(2) + '</span>';
                html += '</div>';
            });
        }

        if (currentUser && mid) {
            html += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border-color)">';
            html += '<div style="margin-bottom:8px;font-size:14px;color:var(--text-secondary)">为这部电影评分:</div>';
            html += '<div class="rating-stars" id="ratingStars">';
            for (let i = 1; i <= 5; i++) html += '<span class="rating-star" data-v="' + i + '" onclick="submitRating(' + mid + ',' + i + ')">&#9733;</span>';
            html += '</div></div>';
        }

        html += '</div></div>';
        mc.innerHTML = html;
    } catch(e) {
        mc.innerHTML = '<div class="modal-overlay" onclick="this.remove()"><div class="modal"><p style="color:#ff7675">加载失败: ' + escHtml(e.message) + '</p></div></div>';
    }
}

async function submitRating(mid, rating) {
    if (!currentUser) { showToast('请先登录', 'error'); return; }
    try {
        await apiFetch('/ratings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ user_id: currentUser.user_id, movie_id: mid, rating: rating }) });
        showToast('评分成功! ' + rating + '星', 'success');
        const stars = document.querySelectorAll('#ratingStars .rating-star');
        stars.forEach(s => { s.classList.toggle('filled', parseInt(s.dataset.v) <= rating); });
    } catch(e) { showToast(e.message, 'error'); }
}

async function getRecommendations() {
    const uid = $('recUserId').value;
    const algo = $('recAlgorithm').value;
    const num = $('recNum').value || 10;
    const container = $('recResults');
    if (!uid) { showToast('请输入用户ID', 'error'); return; }
    showLoading(container, '正在智能推荐中...');
    try {
        const data = await apiFetch('/recommendations/' + uid + '?algorithm=' + algo + '&num=' + num);
        if (!data.recommendations || data.recommendations.length === 0) {
            showEmpty(container, '&#x1f614;', '暂无推荐结果', '暂时没有可推荐的电影');
            return;
        }
        const algoName = data.algorithm || (algo === 'itemcf' ? '物品协同过滤' : '神经网络模型');
        let html = '<div style="margin-bottom:16px;color:var(--text-secondary);font-size:14px">为用户 <strong style="color:var(--accent-secondary)">' + uid + '</strong> 使用 <strong style="color:var(--accent-secondary)">' + escHtml(algoName) + '</strong> 推荐了 <strong style="color:var(--accent-secondary)">' + data.recommendations.length + '</strong> 部电影</div>';
        if (data.message) {
            html += '<div style="margin-bottom:16px;padding:12px 14px;border:1px solid var(--border-color);border-radius:8px;color:var(--text-secondary);font-size:13px;background:var(--bg-secondary)">' + escHtml(data.message) + '</div>';
        }
        html += '<div class="card-grid">';
        for (let i = 0; i < data.recommendations.length; i++) {
            const rec = data.recommendations[i];
            try {
                const info = await apiFetch('/movies/' + rec.movie_id);
                html += renderMovieCard({...info, score: rec.score}, true, true, 'score');
            } catch(e) {
                html += renderMovieCard({movie_id: rec.movie_id, title: '电影 #' + rec.movie_id, score: rec.score, genres: ''}, true, false, 'score');
            }
        }
        html += '</div>';
        container.innerHTML = html;
        showToast('推荐获取成功!', 'success');
    } catch(e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x26a0;</div><div class="empty-state-text">推荐失败</div><div class="empty-state-sub">' + escHtml(e.message) + '</div></div>';
    }
}
async function searchMovies(page) {
    page = page || 1;
    searchPage = page;
    const q = $('searchQuery').value;
    const genre = $('searchGenre').value;
    const yf = $('searchYearFrom').value;
    const yt = $('searchYearTo').value;
    const sort = $('searchSort').value;
    const container = $('searchResults');
    showLoading(container, '搜索中...');
    let url = '/movies/search?page=' + page + '&per_page=20';
    if (q) url += '&q=' + encodeURIComponent(q);
    if (genre) url += '&genre=' + encodeURIComponent(genre);
    if (yf) url += '&year_from=' + yf;
    if (yt) url += '&year_to=' + yt;
    if (sort) url += '&sort=' + sort;
    try {
        const data = await apiFetch(url);
        if (!data.movies || data.movies.length === 0) {
            showEmpty(container, '&#x1f50d;', '未找到匹配电影', '请尝试调整搜索条件');
            return;
        }
        let html = '<div style="margin-bottom:16px;color:var(--text-secondary);font-size:14px">共找到 <strong style="color:var(--accent-secondary)">' + (data.total || data.movies.length) + '</strong> 部电影</div>';
        html += '<div class="card-grid">';
        data.movies.forEach(m => { html += renderMovieCard(m, true, true, 'avg_rating'); });
        html += '</div>';
        const totalPages = Math.ceil((data.total || data.movies.length) / 20);
        if (totalPages > 1) {
            html += '<div class="pagination">';
            html += '<button class="page-btn" ' + (page <= 1 ? 'disabled' : '') + ' onclick="searchMovies(' + (page-1) + ')">&laquo; 上一页</button>';
            const start = Math.max(1, page - 2), end = Math.min(totalPages, page + 2);
            for (let i = start; i <= end; i++) {
                html += '<button class="page-btn' + (i === page ? ' active' : '') + '" onclick="searchMovies(' + i + ')">' + i + '</button>';
            }
            html += '<button class="page-btn" ' + (page >= totalPages ? 'disabled' : '') + ' onclick="searchMovies(' + (page+1) + ')">下一页 &raquo;</button>';
            html += '<span class="page-info">' + page + ' / ' + totalPages + '</span>';
            html += '</div>';
        }
        container.innerHTML = html;
    } catch(e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x26a0;</div><div class="empty-state-text">搜索失败</div><div class="empty-state-sub">' + escHtml(e.message) + '</div></div>';
    }
}

async function getTopMovies() {
    const genre = $('topGenre').value;
    const container = $('topResults');
    showLoading(container, '加载排行榜...');
    let url = '/movies/top?limit=20';
    if (genre) url += '&genre=' + encodeURIComponent(genre);
    try {
        const data = await apiFetch(url);
        const movies = data.movies || data;
        if (!movies || movies.length === 0) {
            showEmpty(container, '&#x1f3c6;', '暂无排行数据');
            return;
        }
        let html = '<div class="card-grid">';
        movies.forEach((m, i) => {
            html += '<div class="movie-card" style="animation-delay:' + (i*0.05) + 's">';
            html += '<div class="movie-card-header"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:24px;font-weight:800;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">' + (i+1) + '</span><div class="movie-card-title">' + escHtml(m.title || '电影') + '</div></div>';
            if (m.year) html += '<span class="movie-card-year">' + escHtml(String(m.year)) + '</span>';
            html += '</div>';
            html += '<div class="movie-card-score ' + scoreClass(m.avg_rating || 0) + '">&#9733; ' + Number(m.avg_rating || 0).toFixed(2) + '</div>';
            if (m.genres) {
                const gl = typeof m.genres === 'string' ? m.genres.split('|').filter(Boolean) : (Array.isArray(m.genres) ? m.genres : []);
                html += '<div class="movie-card-genres">';
                gl.forEach(g => html += '<span class="genre-tag">' + escHtml(g) + '</span>');
                html += '</div>';
            }
            html += '<div class="movie-card-footer">';
            const mid = m.movie_id || m.id;
            if (mid) {
                const isFav = favoritesCache.has(mid);
                html += '<button class="fav-btn' + (isFav ? ' active' : '') + '" onclick="toggleFavorite(' + mid + ',this)">' + (isFav ? '&#9829; 已收藏' : '&#9825; 收藏') + '</button>';
                html += '<button class="detail-btn" onclick="showMovieDetail(' + mid + ')">详情 &#8594;</button>';
            }
            html += '</div></div>';
        });
        html += '</div>';
        container.innerHTML = html;
    } catch(e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x26a0;</div><div class="empty-state-text">加载失败</div><div class="empty-state-sub">' + escHtml(e.message) + '</div></div>';
    }
}

async function loadDashboard() {
    const container = $('dashboardContent');
    showLoading(container, '加载系统数据...');
    try {
        const data = await apiFetch('/stats');
        let html = '<div class="stats-grid">';
        const stats = [
            { icon: '&#x1f3ac;', value: data.total_movies, label: '电影总数' },
            { icon: '&#x2b50;', value: data.total_ratings, label: '评分总数' },
            { icon: '&#x1f465;', value: data.total_users, label: '用户总数' },
            { icon: '&#x1f4c8;', value: data.total_recommendations, label: '推荐次数' },
            { icon: '&#x1f50d;', value: data.total_searches, label: '搜索次数' },
            { icon: '&#x2764;', value: data.total_favorites, label: '收藏总数' },
            { icon: '&#x1f3af;', value: Number(data.avg_rating).toFixed(2), label: '平均评分' },
            { icon: '&#x1f4c5;', value: formatYearRange(data.year_range), label: '年份范围' }
        ];
        stats.forEach(s => {
            html += '<div class="stat-card"><div class="stat-icon">' + s.icon + '</div><div class="stat-value">' + s.value + '</div><div class="stat-label">' + s.label + '</div></div>';
        });
        html += '</div>';

        html += '<div class="dashboard-grid">';
        html += '<div>';
        html += '<div class="section-title">评分分布</div>';
        html += '<div class="bar-chart"><div class="bar-chart-title">各评分值记录数量</div>';
        if (data.rating_distribution) {
            const rd = data.rating_distribution;
            const scores = [5, 4, 3, 2, 1];
            const maxV = Math.max(...scores.map(i => Number(rd[String(i)] || rd[i] || 0)), 1);
            for (const score of scores) {
                const v = Number(rd[String(score)] || rd[score] || 0);
                const pct = (v / maxV * 100).toFixed(1);
                html += '<div class="bar-row"><div class="bar-label">' + score + '分</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"><span class="bar-fill-text">' + v + '</span></div></div></div>';
            }
        } else {
            html += '<p style="color:var(--text-muted);font-size:13px">暂无数据</p>';
        }
        html += '</div></div>';

        html += '<div>';
        html += '<div class="section-title">热门类型</div>';
        html += '<div class="genres-chart"><div class="bar-chart-title">电影类型分布 Top 10</div>';
        if (data.top_genres) {
            const tg = data.top_genres;
            const entries = Array.isArray(tg) ? tg : Object.entries(tg);
            const maxG = Array.isArray(tg) ? Math.max(...tg.map(e => e.count || e[1]), 1) : Math.max(...Object.values(tg), 1);
            const items = Array.isArray(tg) ? tg.map(e => ({name: e.genre || e.genres || e.name || e[0], count: e.count || e[1]})) : Object.entries(tg).map(([k,v]) => ({name: k, count: v}));
            items.slice(0, 10).forEach(g => {
                const pct = (g.count / maxG * 100).toFixed(1);
                html += '<div class="genre-bar-row"><div class="genre-label">' + escHtml(g.name) + '</div><div class="genre-bar-track"><div class="genre-bar-fill" style="width:' + pct + '%"><span class="genre-bar-fill-text">' + g.count + '</span></div></div></div>';
            });
        } else {
            html += '<p style="color:var(--text-muted);font-size:13px">暂无数据</p>';
        }
        html += '</div></div>';
        html += '</div>';

        if (data.top_genres) {
            const tg = data.top_genres;
            const items = Array.isArray(tg) ? tg.map(e => ({name: e.genre || e.genres || e.name || e[0]})) : Object.entries(tg).map(([k]) => ({name: k}));
            html += '<div class="section-title" style="margin-top:24px">类型标签云</div>';
            html += '<div class="tag-cloud">';
            items.forEach(g => { html += '<span class="tag-cloud-item">' + escHtml(g.name) + '</span>'; });
            html += '</div>';
        }

        container.innerHTML = html;
        setTimeout(() => { document.querySelectorAll('.bar-fill, .genre-bar-fill').forEach(b => { const w = b.style.width; b.style.width = '0%'; setTimeout(() => b.style.width = w, 50); }); }, 100);
    } catch(e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x26a0;</div><div class="empty-state-text">数据加载失败</div><div class="empty-state-sub">' + escHtml(e.message) + '</div></div>';
    }
}
function renderProfile() {
    const container = $('profileContent');
    if (!currentUser) {
        let html = '<div class="auth-container">';
        html += '<div class="auth-tabs">';
        html += '<button class="auth-tab active" onclick="switchAuthTab(\'login\',this)">登录</button>';
        html += '<button class="auth-tab" onclick="switchAuthTab(\'register\',this)">注册</button>';
        html += '</div>';

        html += '<div class="auth-form active" id="authLogin">';
        html += '<div class="form-group"><label>用户名</label><input type="text" id="loginUser" placeholder="输入用户名"></div>';
        html += '<div class="form-group"><label>密码</label><input type="password" id="loginPass" placeholder="输入密码" onkeydown="if(event.key===\'Enter\')doLogin()"></div>';
        html += '<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="doLogin()">登录</button>';
        html += '</div>';

        html += '<div class="auth-form" id="authRegister">';
        html += '<div class="form-group"><label>用户名</label><input type="text" id="regUser" placeholder="设置用户名"></div>';
        html += '<div class="form-group"><label>密码</label><input type="password" id="regPass" placeholder="设置密码"></div>';
        html += '<div class="form-group"><label>邮箱</label><input type="email" id="regEmail" placeholder="输入邮箱"></div>';
        html += '<div class="form-row"><div class="form-group"><label>性别</label><select id="regGender"><option value="">请选择</option><option value="M">男</option><option value="F">女</option><option value="O">其他</option></select></div>';
        html += '<div class="form-group"><label>年龄段</label><select id="regAge"><option value="">请选择</option><option value="under18">18岁以下</option><option value="18-24">18-24岁</option><option value="25-34">25-34岁</option><option value="35-44">35-44岁</option><option value="45-49">45-49岁</option><option value="50-55">50-55岁</option><option value="56+">56岁以上</option></select></div></div>';
        html += '<div class="form-group"><label>职业</label><input type="text" id="regOcc" placeholder="如: 学生、工程师等"></div>';
        html += '<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="doRegister()">注册</button>';
        html += '</div>';

        html += '</div>';
        container.innerHTML = html;
        return;
    }
    loadUserProfile(container);
}

function switchAuthTab(tab, btn) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    btn.classList.add('active');
    $('auth' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

async function doLogin() {
    const u = $('loginUser').value;
    const p = $('loginPass').value;
    if (!u || !p) { showToast('请输入用户名和密码', 'error'); return; }
    try {
        const data = await apiFetch('/users/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: u, password: p}) });
        currentUser = data.user || data;
        localStorage.setItem('movieRecUser', JSON.stringify(currentUser));
        $('userBadgeText').textContent = currentUser.username || '用户' + currentUser.user_id;
        if (currentUser.user_id) {
            $('recUserId').value = currentUser.user_id;
            loadFavorites();
        }
        showToast('登录成功! 欢迎回来, ' + (currentUser.username || ''), 'success');
        renderProfile();
    } catch(e) { showToast(e.message, 'error'); }
}

async function doRegister() {
    const u = $('regUser').value;
    const p = $('regPass').value;
    const e = $('regEmail').value;
    if (!u || !p) { showToast('请输入用户名和密码', 'error'); return; }
    const body = { username: u, password: p, email: e, gender: $('regGender').value, age_group: $('regAge').value, occupation: $('regOcc').value };
    try {
        const data = await apiFetch('/users/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        showToast('注册成功! 请登录', 'success');
        switchAuthTab('login', document.querySelector('.auth-tab'));
    } catch(err) { showToast(err.message, 'error'); }
}

function doLogout() {
    currentUser = null;
    favoritesCache.clear();
    localStorage.removeItem('movieRecUser');
    $('userBadgeText').textContent = '未登录';
    showToast('已退出登录', 'info');
    renderProfile();
}

async function loadFavorites() {
    if (!currentUser) return;
    try {
        const data = await apiFetch('/users/' + currentUser.user_id + '/favorites');
        const favs = data.favorites || data || [];
        favoritesCache.clear();
        favs.forEach(f => favoritesCache.add(f.movie_id || f.id));
    } catch(e) {}
}

async function loadUserProfile(container) {
    showLoading(container, '加载个人资料...');
    try {
        const profile = await apiFetch('/users/' + currentUser.user_id + '/profile');
        let html = '<div class="profile-header">';
        html += '<div class="profile-avatar">' + (currentUser.username || 'U').charAt(0).toUpperCase() + '</div>';
        html += '<div class="profile-info">';
        html += '<div class="profile-name">' + escHtml(currentUser.username || '用户' + currentUser.user_id) + '</div>';
        html += '<div class="profile-meta">ID: ' + currentUser.user_id;
        if (profile.gender) html += ' &middot; ' + escHtml(profile.gender === 'M' ? '男' : profile.gender === 'F' ? '女' : profile.gender);
        if (profile.occupation) html += ' &middot; ' + escHtml(profile.occupation);
        html += '</div>';
        html += '<div class="profile-stats-row">';
        if (profile.total_ratings !== undefined) html += '<div class="profile-stat-item">评分: <span>' + profile.total_ratings + '</span></div>';
        if (profile.total_favorites !== undefined) html += '<div class="profile-stat-item">收藏: <span>' + profile.total_favorites + '</span></div>';
        if (profile.avg_rating !== undefined) html += '<div class="profile-stat-item">均分: <span>' + Number(profile.avg_rating).toFixed(2) + '</span></div>';
        html += '</div></div>';
        html += '<button class="btn btn-danger btn-sm" onclick="doLogout()">退出登录</button>';
        html += '</div>';

        if (profile.favorite_genres && profile.favorite_genres.length > 0) {
            html += '<div class="section-title">偏好的电影类型</div>';
            html += '<div class="tag-cloud" style="margin-bottom:24px">';
            profile.favorite_genres.forEach(g => { html += '<span class="tag-cloud-item">' + escHtml(typeof g === 'string' ? g : g.genre || g.name) + '</span>'; });
            html += '</div>';
        }

        const favs = await apiFetch('/users/' + currentUser.user_id + '/favorites');
        const favList = favs.favorites || favs || [];
        html += '<div class="section-title">我的收藏 (' + favList.length + ')</div>';
        if (favList.length > 0) {
            html += '<div class="favorites-grid">';
            favList.forEach(f => {
                const mid = f.movie_id || f.id;
                html += '<div class="fav-item">';
                html += '<div class="fav-item-info"><div class="fav-item-title">' + escHtml(f.title || '电影 #' + mid) + '</div>';
                if (f.genres) html += '<div class="fav-item-genres">' + escHtml(f.genres) + '</div>';
                html += '</div>';
                html += '<button class="btn btn-danger btn-sm" onclick="removeFavorite(' + mid + ',this.closest(\'.fav-item\'))">&#x2715;</button>';
                html += '</div>';
            });
            html += '</div>';
        } else {
            html += '<div style="color:var(--text-muted);font-size:13px;padding:16px 0">暂无收藏电影</div>';
        }

        const ratings = await apiFetch('/users/' + currentUser.user_id + '/ratings');
        const ratingList = ratings.ratings || ratings || [];
        html += '<div class="section-title" style="margin-top:24px">我的评分记录 (' + ratingList.length + ')</div>';
        if (ratingList.length > 0) {
            html += '<div style="max-height:400px;overflow-y:auto">';
            ratingList.slice(0, 30).forEach(r => {
                html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-color)">';
                html += '<span style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(r.title || '电影 #' + (r.movie_id || '')) + '</span>';
                html += '<span class="movie-card-score ' + scoreClass(r.rating || 0) + '" style="font-size:12px;padding:2px 10px;margin:0;flex-shrink:0">&#9733; ' + (r.rating || 0) + '</span>';
                html += '</div>';
            });
            if (ratingList.length > 30) html += '<div style="text-align:center;padding:12px;color:var(--text-muted);font-size:12px">仅显示前30条...</div>';
            html += '</div>';
        } else {
            html += '<div style="color:var(--text-muted);font-size:13px;padding:16px 0">暂无评分记录</div>';
        }

        container.innerHTML = html;
    } catch(e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x26a0;</div><div class="empty-state-text">加载个人资料失败</div><div class="empty-state-sub">' + escHtml(e.message) + '</div></div>';
    }
}

async function removeFavorite(mid, el) {
    try {
        await apiFetch('/users/' + currentUser.user_id + '/favorites', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({movie_id: mid}) });
        favoritesCache.delete(mid);
        if (el) el.remove();
        showToast('已取消收藏', 'info');
    } catch(e) { showToast(e.message, 'error'); }
}

async function init() {
    const saved = localStorage.getItem('movieRecUser');
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            $('userBadgeText').textContent = currentUser.username || '用户' + currentUser.user_id;
            if (currentUser.user_id) {
                $('recUserId').value = currentUser.user_id;
                loadFavorites();
            }
        } catch(e) {}
    }
    try {
        await apiFetch('/health');
        loadGenres();
        loadDashboard();
    } catch(e) {
        showToast('无法连接后端服务，请确保API服务正在运行', 'error');
    }
}

async function loadGenres() {
    try {
        const data = await apiFetch('/movies/genres');
        const genres = data.genres || data || [];
        ['searchGenre', 'topGenre'].forEach(id => {
            const sel = $(id);
            const current = sel.value;
            sel.innerHTML = '<option value="">全部类型</option>';
            genres.forEach(g => {
                const name = typeof g === 'string' ? g : (g.genre || g.name || g);
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
            sel.value = current;
        });
    } catch(e) {}
}

init();
</script>
</body>
</html>
