<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影推荐系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .input-group input, .input-group select {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            flex: 1;
        }
        
        .input-group button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .input-group button:hover {
            background: #764ba2;
        }
        
        .results {
            margin-top: 30px;
        }
        
        .results h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .movie-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #ddd;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .movie-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .movie-score {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .movie-genre {
            color: #666;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .error {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 20px 0;
        }
        
        .info {
            background: #17a2b8;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>电影推荐系统</h1>
        <p class="subtitle">基于物品协同过滤和神经网络的电影推荐</p>
        
        <div class="input-group">
            <input type="number" id="userId" placeholder="输入用户ID (1-610)" min="1" max="610">
            <select id="algorithm">
                <option value="itemcf">物品协同过滤</option>
                <option value="neural">神经网络模型</option>
            </select>
            <input type="number" id="numRecs" placeholder="推荐数量" value="10" min="1" max="20">
            <button onclick="getRecommendations()">获取推荐</button>
        </div>
        
        <div id="results" class="results"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function getRecommendations() {
            const userId = document.getElementById('userId').value;
            const algorithm = document.getElementById('algorithm').value;
            const numRecs = document.getElementById('numRecs').value;
            const resultsDiv = document.getElementById('results');
            
            if (!userId || userId < 1 || userId > 610) {
                resultsDiv.innerHTML = '<div class="error">请输入有效的用户ID (1-610)</div>';
                return;
            }
            
            resultsDiv.innerHTML = '<div class="loading">正在获取推荐...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/recommendations/${userId}?algorithm=${algorithm}&num=${numRecs}`);
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || '获取推荐失败');
                }
                
                displayResults(data, algorithm);
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">${error.message}</div>`;
            }
        }
        
        async function displayResults(data, algorithm) {
            const resultsDiv = document.getElementById('results');
            
            if (!data.recommendations || data.recommendations.length === 0) {
                resultsDiv.innerHTML = '<div class="info">没有找到推荐结果</div>';
                return;
            }
            
            const algorithmName = algorithm === 'itemcf' ? '物品协同过滤' : '神经网络模型';
            
            let html = `
                <h2>用户 ${data.user_id} 的推荐结果 (${algorithmName})</h2>
                <div class="movie-grid">
            `;
            
            for (const rec of data.recommendations) {
                const movieInfo = await getMovieInfo(rec.movie_id);
                const title = movieInfo ? movieInfo.title : `电影 ID: ${rec.movie_id}`;
                const genres = movieInfo ? movieInfo.genres : '未知类型';
                const score = rec.score.toFixed(2);
                
                html += `
                    <div class="movie-card">
                        <div class="movie-title">${title}</div>
                        <div class="movie-score">预测评分: ${score}</div>
                        <div class="movie-genre">${genres}</div>
                    </div>
                `;
            }
            
            html += '</div>';
            resultsDiv.innerHTML = html;
        }
        
        async function getMovieInfo(movieId) {
            try {
                const response = await fetch(`${API_BASE}/movies/${movieId}`);
                if (!response.ok) return null;
                return await response.json();
            } catch (error) {
                return null;
            }
        }
        
        // 页面加载时检查API状态
        fetch(`${API_BASE}/health`)
            .then(response => response.json())
            .then(data => {
                console.log('API状态:', data);
            })
            .catch(error => {
                console.error('API连接失败:', error);
                document.getElementById('results').innerHTML = 
                    '<div class="error">无法连接到后端API。请确保后端服务正在运行。</div>';
            });
    </script>
</body>
</html>
